<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juliet V32</title>

<style>
body { margin:0; background:#0f172a; color:white; font-family:Arial; }

.topbar {
    padding:15px;
    background:#111827;
    text-align:center;
    font-weight:bold;
}

.chat {
    height:80vh;
    overflow:auto;
    padding:20px;
}

.msg {
    margin:10px 0;
    padding:12px;
    border-radius:10px;
    max-width:70%;
}

.user { background:#1f2937; margin-left:auto; }
.bot { background:#2563eb; }

.input {
    display:flex;
    padding:10px;
    background:#111827;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:5px;
}

button {
    margin-left:10px;
    padding:10px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">Juliet V32</div>

<div id="chat" class="chat"></div>

<div class="input">
    <input id="input" placeholder="Habla con Juliet..." onkeydown="if(event.key==='Enter') send()">
    <button onclick="send()">Enviar</button>
</div>

<script>
async function send(){
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    if(!input.value) return;

    let text = input.value;
    input.value = "";

    chat.innerHTML += `<div class="msg user">${text}</div>`;

    let res = await fetch("/chat?prompt=" + encodeURIComponent(text));
    let reader = res.body.getReader();
    let decoder = new TextDecoder();

    let botDiv = document.createElement("div");
    botDiv.className = "msg bot";
    chat.appendChild(botDiv);

    while(true){
        const {done, value} = await reader.read();
        if(done) break;
        botDiv.innerHTML += decoder.decode(value);
        chat.scrollTop = chat.scrollHeight;
    }
}
</script>

</body>
</html>
