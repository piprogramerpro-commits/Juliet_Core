<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juliet V21</title>

<link rel="icon" href="/favicon.ico">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body {
    margin: 0;
    background: #343541;
    color: white;
    font-family: Arial;
}

.topbar {
    background: #202123;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

.chat {
    height: 65vh;
    overflow-y: auto;
    padding: 20px;
}

.msg { margin: 10px 0; }
.user { color: #4ade80; }
.ai { color: #60a5fa; }

.input {
    display: flex;
    background: #40414f;
    padding: 10px;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    outline: none;
}

button {
    background: #10a37f;
    border: none;
    padding: 10px;
    color: white;
    cursor: pointer;
}

#viewer {
    height: 300px;
}
</style>
</head>

<body>

<div class="topbar">
    <div><b>Juliet V21 🚀</b></div>
    <button onclick="open3D()">🌍</button>
</div>

<div class="chat" id="chat"></div>

<div class="input">
    <input id="prompt" placeholder="Escribe algo...">
    <button onclick="send()">➤</button>
</div>

<div id="viewer"></div>

<script>
async function send(){
    const input = document.getElementById("prompt");
    const text = input.value;

    if(!text) return;

    const chat = document.getElementById("chat");

    chat.innerHTML += `<div class="msg user">Tú: ${text}</div>`;

    const res = await fetch("/chat?prompt=" + encodeURIComponent(text));
    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let div = document.createElement("div");
    div.className = "msg ai";
    div.innerHTML = "Juliet: ";
    chat.appendChild(div);

    while(true){
        const {done, value} = await reader.read();
        if(done) break;
        div.innerHTML += decoder.decode(value);
    }

    input.value = "";
}

let renderer;

function open3D(){
    const viewer = document.getElementById("viewer");
    viewer.innerHTML = "";

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, viewer.clientWidth/300, 0.1, 1000);

    renderer = new THREE.WebGLRenderer();
    renderer.setSize(viewer.clientWidth, 300);
    viewer.appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshNormalMaterial();
    const cube = new THREE.Mesh(geometry, material);

    scene.add(cube);
    camera.position.z = 5;

    function animate(){
        requestAnimationFrame(animate);
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;
        renderer.render(scene, camera);
    }

    animate();
}
</script>

</body>
</html>
